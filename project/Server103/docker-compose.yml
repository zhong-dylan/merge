services:
  postgres:
    image: postgres:15-alpine
    container_name: nakama-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: local
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      nakama_shared:
        aliases:
          - postgres
          - nakama-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: nakama_postgres_data

networks:
  nakama_shared:
    external: true
    name: nakama_shared
