services:
  postgres:
    image: postgres:15-alpine
    container_name: nakama-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: local
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    build:
      context: .
      dockerfile: Dockerfile
      pull: false
    container_name: nakama
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address local:localdb@postgres:5432/nakama &&
        exec /nakama/nakama
        --name nakama1
        --database.address local:localdb@postgres:5432/nakama
        --config /nakama/data/nakama.yml
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./nakama.yml:/nakama/data/nakama.yml:ro

volumes:
  postgres_data:
